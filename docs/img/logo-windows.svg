<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Windows">
  <defs>
    <linearGradient id="badge-win" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2483c"/>
      <stop offset="1" stop-color="#b8352c"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#badge-win)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="#fff8f3" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Four panes ("flag"), the generic Windows glyph, recolored into the app's cream tone -->
  <g fill="#fff8f3">
    <rect x="27" y="27" width="28" height="28" rx="3"/>
    <rect x="65" y="27" width="28" height="28" rx="3"/>
    <rect x="27" y="65" width="28" height="28" rx="3"/>
    <rect x="65" y="65" width="28" height="28" rx="3"/>
  </g>
</svg>
